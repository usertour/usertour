name: Enterprise License Docker Build

on:
  workflow_dispatch:
    inputs:
      generate_new_keys:
        description: 'Generate new RSA key pair for license signing'
        required: true
        default: 'false'
        type: boolean
      version_tag:
        description: 'Version tag for the Docker image (e.g., 1.0.0-enterprise)'
        required: true
        type: string

jobs:
  generate_keys_and_build:
    name: Generate License Keys and Build Enterprise Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Generate RSA Key Pair
        if: ${{ inputs.generate_new_keys == true }}
        id: generate_keys
        run: |
          # Create keys directory
          mkdir -p license-keys

          # Generate 2048-bit RSA private key
          openssl genrsa -out license-keys/license-private.pem 2048

          # Extract public key from private key
          openssl rsa -in license-keys/license-private.pem -pubout -out license-keys/license-public.pem

          # Output public key for reference (safe to display)
          echo "=== Generated Public Key ==="
          cat license-keys/license-public.pem
          echo "==========================="

          # Store public key as output for updating the service
          PUBLIC_KEY=$(cat license-keys/license-public.pem)
          echo "public_key<<EOF" >> $GITHUB_OUTPUT
          echo "$PUBLIC_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Store private key as base64 for secret storage
          PRIVATE_KEY_B64=$(cat license-keys/license-private.pem | base64 -w 0)
          echo "::add-mask::$PRIVATE_KEY_B64"
          echo "private_key_b64=$PRIVATE_KEY_B64" >> $GITHUB_OUTPUT

      - name: Use Existing Keys from Secrets
        if: ${{ inputs.generate_new_keys == false }}
        run: |
          mkdir -p license-keys

          # Decode private key from secret
          echo "${{ secrets.LICENSE_PRIVATE_KEY_B64 }}" | base64 -d > license-keys/license-private.pem

          # Extract public key from private key
          openssl rsa -in license-keys/license-private.pem -pubout -out license-keys/license-public.pem

          echo "Using existing license keys from secrets"

      - name: Update License Service with Public Key
        run: |
          # Read the public key
          PUBLIC_KEY=$(cat license-keys/license-public.pem)

          # Create a Node.js script to safely update the public key
          cat > update-public-key.js << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');

          const servicePath = path.join(__dirname, 'apps/server/src/license/license.service.ts');
          const publicKeyPath = path.join(__dirname, 'license-keys/license-public.pem');

          const publicKey = fs.readFileSync(publicKeyPath, 'utf8');
          let serviceContent = fs.readFileSync(servicePath, 'utf8');

          // Replace the embedded public key
          const keyRegex = /const LICENSE_PUBLIC_KEY = `-----BEGIN PUBLIC KEY-----[\s\S]*?-----END PUBLIC KEY-----`;/;
          const newKey = `const LICENSE_PUBLIC_KEY = \`${publicKey.trim()}\`;`;

          serviceContent = serviceContent.replace(keyRegex, newKey);

          fs.writeFileSync(servicePath, serviceContent);
          console.log('Public key updated in license service');
          SCRIPT

          node update-public-key.js

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/usertour-enterprise:${{ inputs.version_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/usertour-enterprise:latest
          labels: |
            org.opencontainers.image.version=${{ inputs.version_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            LICENSE_ADMIN_ENABLED=true

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Output New Key Information
        if: ${{ inputs.generate_new_keys == true }}
        run: |
          echo "========================================"
          echo "NEW LICENSE KEYS GENERATED"
          echo "========================================"
          echo ""
          echo "IMPORTANT: Save the private key as a GitHub secret!"
          echo ""
          echo "1. Go to Settings > Secrets and variables > Actions"
          echo "2. Create a new secret named: LICENSE_PRIVATE_KEY_B64"
          echo "3. Set the value to the base64-encoded private key below"
          echo ""
          echo "Base64 Private Key (SAVE THIS AS SECRET):"
          echo "${{ steps.generate_keys.outputs.private_key_b64 }}"
          echo ""
          echo "========================================"
          echo "PUBLIC KEY (embedded in Docker image):"
          echo "========================================"
          cat license-keys/license-public.pem
          echo ""
          echo "========================================"

      - name: Notify team on failure
        if: ${{ failure() }}
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.BUILD_NOTIFICATION_URL }}
          method: 'POST'
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"msg_type": "text","text": {"content": "Enterprise license Docker build failed"}}'

  output_usage_instructions:
    name: Output Usage Instructions
    runs-on: ubuntu-latest
    needs: generate_keys_and_build

    steps:
      - name: Print Usage Instructions
        run: |
          echo "========================================"
          echo "ENTERPRISE LICENSE DOCKER IMAGE BUILT"
          echo "========================================"
          echo ""
          echo "Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/usertour-enterprise:${{ inputs.version_tag }}"
          echo ""
          echo "To generate licenses, use the admin API:"
          echo ""
          echo "1. Set the LICENSE_PRIVATE_KEY environment variable in your deployment"
          echo "   (Base64-encoded private key)"
          echo ""
          echo "2. Use the GraphQL mutation:"
          echo ""
          echo '   mutation {'
          echo '     generateLicense(input: {'
          echo '       projectId: "your-project-id"'
          echo '       plan: "enterprise"'
          echo '       subject: "Customer Name"'
          echo '       expiresInDays: 365'
          echo '       features: ["*"]'
          echo '     }) {'
          echo '       token'
          echo '       expiresAt'
          echo '     }'
          echo '   }'
          echo ""
          echo "========================================"
