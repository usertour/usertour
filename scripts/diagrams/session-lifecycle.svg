<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" width="1400" height="1100">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="1400" height="1100" fill="#ffffff"/>
  <text x="700" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#1e293b">Session Lifecycle</text>
  <text x="700" y="68" text-anchor="middle" font-size="13" fill="#64748b">session.state: 0 = active, 1 = ended</text>
  <text x="50" y="108" font-size="15" font-weight="600" fill="#1e293b">1. Generic Lifecycle &#8212; applies to all session-creating types</text>
  <rect x="60" y="140" width="280" height="240" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="200" y="166" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Start Triggers</text>
  <text x="200" y="184" text-anchor="middle" font-size="11" fill="#64748b">contentStartReason</text>
  <text x="84" y="216" font-size="12" fill="#334155">&#8226; START_FROM_CONDITION</text>
  <text x="84" y="238" font-size="12" fill="#334155">&#8226; START_FROM_MANUAL</text>
  <text x="84" y="260" font-size="12" fill="#334155">&#8226; START_FROM_URL</text>
  <text x="84" y="282" font-size="12" fill="#334155">&#8226; START_FROM_ACTION</text>
  <text x="84" y="304" font-size="12" fill="#334155">&#8226; START_FROM_PROGRAM</text>
  <text x="84" y="326" font-size="12" fill="#334155">&#8226; START_FROM_CONTENT_ID</text>
  <text x="84" y="348" font-size="12" fill="#334155">&#8226; START_FROM_SESSION (recovery)</text>
  <rect x="420" y="200" width="240" height="120" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="540" y="232" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a8a">ACTIVE</text>
  <text x="540" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">state = 0</text>
  <text x="540" y="282" text-anchor="middle" font-size="11" fill="#475569">Emits SEEN / progress events</text>
  <text x="540" y="300" text-anchor="middle" font-size="11" fill="#475569">while session is open</text>
  <rect x="900" y="200" width="240" height="120" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="1020" y="232" text-anchor="middle" font-size="16" font-weight="600" fill="#14532d">ENDED</text>
  <text x="1020" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">state = 1</text>
  <text x="1020" y="282" text-anchor="middle" font-size="11" fill="#475569">Termination event written</text>
  <text x="1020" y="300" text-anchor="middle" font-size="11" fill="#475569">with end-reason attribute</text>
  <line x1="340" y1="260" x2="412" y2="260" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="660" y1="260" x2="892" y2="260" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="688" y="246" width="184" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="780" y="262" text-anchor="middle" font-size="11" fill="#334155">endContent() &#183; endSession() API</text>
  <rect x="420" y="380" width="720" height="130" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="436" y="404" font-size="13" font-weight="600" fill="#92400e">End Reasons (contentEndReason &#8212; any of these triggers state 0 &#8594; 1)</text>
  <text x="436" y="430" font-size="11" fill="#334155">&#8226; USER_CLOSED</text>
  <text x="616" y="430" font-size="11" fill="#334155">&#8226; CLOSE_BUTTON_DISMISS</text>
  <text x="796" y="430" font-size="11" fill="#334155">&#8226; BACKDROP_DISMISS</text>
  <text x="976" y="430" font-size="11" fill="#334155">&#8226; DISMISS_BUTTON</text>
  <text x="436" y="448" font-size="11" fill="#334155">&#8226; ACTION_DISMISS</text>
  <text x="616" y="448" font-size="11" fill="#334155">&#8226; TRIGGER_DISMISS</text>
  <text x="796" y="448" font-size="11" fill="#334155">&#8226; AUTO_DISMISSED</text>
  <text x="976" y="448" font-size="11" fill="#334155">&#8226; TOOLTIP_TARGET_MISSING</text>
  <text x="436" y="466" font-size="11" fill="#334155">&#8226; ADMIN_ENDED</text>
  <text x="616" y="466" font-size="11" fill="#334155">&#8226; END_FROM_PROGRAM</text>
  <text x="796" y="466" font-size="11" fill="#334155">&#8226; UNPUBLISHED_CONTENT</text>
  <text x="976" y="466" font-size="11" fill="#334155">&#8226; LAUNCHER_DEACTIVATED</text>
  <text x="436" y="484" font-size="11" fill="#334155">&#8226; STORE_NOT_FOUND</text>
  <path d="M 780 380 L 780 270" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="50" y="548" font-size="15" font-weight="600" fill="#1e293b">2. ContentType-Specific Lifecycle</text>
  <text x="50" y="568" font-size="12" fill="#64748b">Source enum: ContentDataType (packages/types/src/types/contents.ts)</text>
  <rect x="55" y="588" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 65 588 L 465 588 Q 475 588 475 598 L 475 632 L 55 632 L 55 598 Q 55 588 65 588 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="75" y="616" font-size="16" font-weight="600" fill="#2563eb">FLOW</text>
  <rect x="359" y="600" width="104" height="20" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="411" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">max 1 active</text>
  <text x="75" y="660" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="170" y="660" font-size="11" fill="#1f2937">Rules &#183; Manual &#183; Action &#183; Program &#183; URL</text>
  <text x="75" y="682" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="170" y="682" font-size="11" fill="#1f2937">FLOW_STARTED &#8594; FLOW_STEP_SEEN&#215;N</text>
  <text x="75" y="704" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="170" y="704" font-size="11" fill="#1f2937">FLOW_COMPLETED (last step reached)</text>
  <text x="75" y="726" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="170" y="726" font-size="11" fill="#1f2937">FLOW_ENDED + state = 1</text>
  <text x="75" y="748" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="170" y="748" font-size="11" fill="#1f2937">&#10003; supported</text>
  <text x="75" y="770" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="170" y="770" font-size="11" fill="#1f2937">1 active session per user (re-creatable after end)</text>
  <rect x="500" y="588" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 510 588 L 910 588 Q 920 588 920 598 L 920 632 L 500 632 L 500 598 Q 500 588 510 588 Z" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="520" y="616" font-size="16" font-weight="600" fill="#16a34a">CHECKLIST</text>
  <rect x="804" y="600" width="104" height="20" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="856" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">max 1 active</text>
  <text x="520" y="660" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="615" y="660" font-size="11" fill="#1f2937">Rules &#183; Manual &#183; Action</text>
  <text x="520" y="682" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="615" y="682" font-size="11" fill="#1f2937">CHECKLIST_STARTED  &#8594;</text>
  <text x="615" y="698" font-size="11" fill="#1f2937">CHECKLIST_TASK_COMPLETED&#215;N</text>
  <text x="520" y="720" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="615" y="720" font-size="11" fill="#1f2937">CHECKLIST_COMPLETED (all tasks done)</text>
  <text x="520" y="742" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="615" y="742" font-size="11" fill="#1f2937">CHECKLIST_DISMISSED + state = 1</text>
  <text x="520" y="764" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="615" y="764" font-size="11" fill="#1f2937">&#10003; supported</text>
  <text x="520" y="786" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="615" y="786" font-size="11" fill="#1f2937">1 active session per user (re-creatable after end)</text>
  <rect x="945" y="588" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 955 588 L 1355 588 Q 1365 588 1365 598 L 1365 632 L 945 632 L 945 598 Q 945 588 955 588 Z" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="965" y="616" font-size="16" font-weight="600" fill="#ea580c">BANNER</text>
  <rect x="1263" y="600" width="90" height="20" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1"/>
  <text x="1308" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#ea580c">max 1 ever</text>
  <text x="965" y="660" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="1060" y="660" font-size="11" fill="#1f2937">Rules (page-load condition)</text>
  <text x="965" y="682" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="1060" y="682" font-size="11" fill="#1f2937">BANNER_SEEN</text>
  <text x="965" y="704" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="1060" y="704" font-size="11" fill="#1f2937">&#8212;</text>
  <text x="965" y="726" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="1060" y="726" font-size="11" fill="#1f2937">BANNER_DISMISSED + state = 1</text>
  <text x="965" y="748" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="1060" y="748" font-size="11" fill="#1f2937">&#10003; supported</text>
  <text x="965" y="770" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="1060" y="770" font-size="11" fill="#1f2937">1 session ever per user (never re-shown after end)</text>
  <rect x="55" y="837" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 65 837 L 465 837 Q 475 837 475 847 L 475 881 L 55 881 L 55 847 Q 55 837 65 837 Z" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="75" y="865" font-size="16" font-weight="600" fill="#9333ea">RESOURCE_CENTER</text>
  <rect x="373" y="849" width="90" height="20" rx="10" fill="#ffffff" stroke="#9333ea" stroke-width="1"/>
  <text x="418" y="863" text-anchor="middle" font-size="10" font-weight="600" fill="#9333ea">max 1 ever</text>
  <text x="75" y="909" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="170" y="909" font-size="11" fill="#1f2937">Manual (Help button) &#183; Rules</text>
  <text x="75" y="931" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="170" y="931" font-size="11" fill="#1f2937">RESOURCE_CENTER_OPENED  &#8594;</text>
  <text x="170" y="947" font-size="11" fill="#1f2937">RESOURCE_CENTER_CLICKED&#215;N</text>
  <text x="75" y="969" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="170" y="969" font-size="11" fill="#1f2937">&#8212;</text>
  <text x="75" y="991" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="170" y="991" font-size="11" fill="#1f2937">RESOURCE_CENTER_DISMISSED + state = 1</text>
  <text x="75" y="1013" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="170" y="1013" font-size="11" fill="#1f2937">&#10003; supported</text>
  <text x="75" y="1035" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="170" y="1035" font-size="11" fill="#1f2937">1 session ever per user (same as Banner)</text>
  <rect x="500" y="837" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 510 837 L 910 837 Q 920 837 920 847 L 920 881 L 500 881 L 500 847 Q 500 837 510 837 Z" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
  <text x="520" y="865" font-size="16" font-weight="600" fill="#0d9488">LAUNCHER</text>
  <rect x="783" y="849" width="125" height="20" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1"/>
  <text x="845" y="863" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">many concurrent</text>
  <text x="520" y="909" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="615" y="909" font-size="11" fill="#1f2937">Rules (page targeting) &#8212; batch</text>
  <text x="520" y="931" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="615" y="931" font-size="11" fill="#1f2937">LAUNCHER_SEEN &#8594; LAUNCHER_ACTIVATED</text>
  <text x="520" y="953" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="615" y="953" font-size="11" fill="#1f2937">&#8212;</text>
  <text x="520" y="975" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="615" y="975" font-size="11" fill="#1f2937">LAUNCHER_DISMISSED + state = 1</text>
  <text x="520" y="997" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="615" y="997" font-size="11" fill="#1f2937">&#10003; supported</text>
  <text x="520" y="1019" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="615" y="1019" font-size="11" fill="#1f2937">multiple concurrent sessions per user</text>
  <rect x="945" y="837" width="420" height="224" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#card-shadow)"/>
  <path d="M 955 837 L 1355 837 Q 1365 837 1365 847 L 1365 881 L 945 881 L 945 847 Q 945 837 955 837 Z" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="965" y="865" font-size="16" font-weight="600" fill="#475569">TRACKER</text>
  <rect x="1263" y="849" width="90" height="20" rx="10" fill="#ffffff" stroke="#475569" stroke-width="1"/>
  <text x="1308" y="863" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">no session</text>
  <text x="965" y="909" font-size="11" font-weight="600" fill="#475569">Start</text>
  <text x="1060" y="909" font-size="11" fill="#1f2937">TRACK_TRACKER_EVENT message from SDK</text>
  <text x="965" y="931" font-size="11" font-weight="600" fill="#475569">Active</text>
  <text x="1060" y="931" font-size="11" fill="#1f2937">&#8212; (no state machine)</text>
  <text x="965" y="953" font-size="11" font-weight="600" fill="#475569">Complete</text>
  <text x="1060" y="953" font-size="11" fill="#1f2937">&#8212;</text>
  <text x="965" y="975" font-size="11" font-weight="600" fill="#475569">End</text>
  <text x="1060" y="975" font-size="11" fill="#1f2937">&#8212; (no session created)</text>
  <text x="965" y="997" font-size="11" font-weight="600" fill="#475569">endSession</text>
  <text x="1060" y="997" font-size="11" fill="#1f2937">&#10007; not applicable</text>
  <text x="965" y="1019" font-size="11" font-weight="600" fill="#475569">Concurrency</text>
  <text x="1060" y="1019" font-size="11" fill="#1f2937">no session created &#8212; event log only</text>
</svg>