<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="/public/favicon/favicon.png" rel="shortcut icon" />
    <link href="/public/favicon/favicon.png" rel="mask-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usertour</title>
    <script src="/config.js"></script>
    <!-- Apply the persisted theme before React mounts so the first paint is
         already correct (no light → dark flash). Reads the same AppStorage key
         that src/contexts/theme-context.tsx writes: namespace `USERTOUR@0.0.1/`
         + key `appearance`, value JSON-wrapped as { value, ... }. Keep both in
         sync if the namespace/key ever changes. -->
    <script>
      (function () {
        try {
          // Auth pages always render light — browser autofill paints inputs a
          // near-white that can't be restyled for dark, so a dark auth page
          // looks broken. Skip applying dark here (kills the first-paint flash);
          // keep this prefix in sync with AuthLayout's useForceLightTheme.
          if (location.pathname.indexOf('/auth/') === 0) {
            return;
          }
          var raw = localStorage.getItem('USERTOUR@0.0.1/appearance');
          var theme = raw ? JSON.parse(raw).value : 'system';
          var isDark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
