server {
    listen ${NGINX_PORT};
    server_name _;

    server_tokens off;

    # Web UI entry files - do not cache so normal reloads can pick up new deployments
    location = /index.html {
        root /usr/share/nginx/html/web;
        add_header Cache-Control "private, no-cache, no-store, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /config.js {
        root /usr/share/nginx/html/web;
        add_header Cache-Control "private, no-cache, no-store, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Web UI - default SPA routing fallback
    location / {
        root /usr/share/nginx/html/web;
        try_files $uri $uri/ /index.html;
    }

    # Web UI static assets - Vite content hashes, cache long-term
    location ^~ /assets {
        root /usr/share/nginx/html/web;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Web UI static assets without content hashes, cache for 7 days
    location ~* ^/(avatars|images|favicon) {
        root /usr/share/nginx/html/web;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Specific SDK files with no-cache headers
    location = /sdk/es2020/usertour.js {
        alias /usr/share/nginx/html/sdk/es2020/usertour.js;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        expires -1;
    }

    location = /sdk/legacy/usertour.iife.js {
        alias /usr/share/nginx/html/sdk/legacy/usertour.iife.js;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        expires -1;
    }

    # SDK
    location /sdk/ {
        alias /usr/share/nginx/html/sdk/;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=31536000";
        expires 1y;
    }

    # API Routes. The `(/|$)` boundary keeps these prefixes from swallowing SPA
    # routes that merely start with the same letters — notably `/oauth-consent`
    # (the OAuth consent PAGE, served by the SPA), which `^/oauth` alone matched,
    # 404ing the consent step and killing the whole OAuth/MCP flow on self-host.
    location ~ ^/(graphql|api|stripe|v1|v2|oauth)(/|$) {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # OAuth discovery metadata (RFC 9728 / RFC 8414) — must reach the server,
    # not the SPA fallback. X-Forwarded-Proto so the issued metadata URLs use the
    # public scheme.
    location ~ ^/\.well-known/oauth {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A browser MCP client fetches this discovery metadata cross-origin.
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # MCP endpoint (Streamable HTTP; may stream via SSE) + its OAuth 401 challenge.
    location /mcp {
        # A browser MCP client's POST carries Authorization + application/json, so
        # it preflights. Answer OPTIONS here (the Nest endpoint is POST-only and
        # would 404 the preflight) with the methods/headers it needs — otherwise the
        # client can't read the 401 challenge or ever send the real request.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Mcp-Session-Id,Mcp-Protocol-Version,Last-Event-ID';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        # Browser MCP clients need to read the WWW-Authenticate challenge to start OAuth.
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Mcp-Session-Id,Mcp-Protocol-Version,Last-Event-ID' always;
        add_header 'Access-Control-Expose-Headers' 'WWW-Authenticate' always;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
} 
