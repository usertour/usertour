server {
    listen ${NGINX_PORT};
    server_name _;

    server_tokens off;

    # Web UI entry files - do not cache so normal reloads can pick up new deployments
    location = /index.html {
        root /usr/share/nginx/html/web;
        add_header Cache-Control "private, no-cache, no-store, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /config.js {
        root /usr/share/nginx/html/web;
        add_header Cache-Control "private, no-cache, no-store, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Web UI - default SPA routing fallback
    location / {
        root /usr/share/nginx/html/web;
        try_files $uri $uri/ /index.html;
    }

    # Web UI static assets - Vite content hashes, cache long-term
    location ^~ /assets {
        root /usr/share/nginx/html/web;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Web UI static assets without content hashes, cache for 7 days
    location ~* ^/(avatars|images|favicon) {
        root /usr/share/nginx/html/web;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Specific SDK files with no-cache headers
    location = /sdk/es2020/usertour.js {
        alias /usr/share/nginx/html/sdk/es2020/usertour.js;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        expires -1;
    }

    location = /sdk/legacy/usertour.iife.js {
        alias /usr/share/nginx/html/sdk/legacy/usertour.iife.js;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        expires -1;
    }

    # SDK
    location /sdk/ {
        alias /usr/share/nginx/html/sdk/;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=31536000";
        expires 1y;
    }

    # API Routes. The `(/|$)` boundary keeps these prefixes from swallowing SPA
    # routes that merely start with the same letters — notably `/oauth-consent`
    # (the OAuth consent PAGE, served by the SPA), which `^/oauth` alone matched,
    # 404ing the consent step and killing the whole OAuth/MCP flow on self-host.
    # `api(-v2)?(-json)?` spells out the Swagger doc paths the server exposes
    # (/api, /api-json, /api-yaml, /api-v2, /api-v2-json, /api-v2-yaml) — the boundary alone would drop
    # the dashed ones back to the SPA. SPA routes like /apikeys still fall through.
    # CORS for these app endpoints is owned by the Nest app (enableCors in
    # configure-app.ts), including OPTIONS preflight — nginx only proxies here,
    # so preflight and the real response always agree (they come from one layer).
    location ~ ^/(graphql|api(-v2)?(-(json|yaml))?|stripe|v1|v2|oauth)(/|$) {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # OAuth discovery metadata (RFC 9728 / RFC 8414) — must reach the server,
    # not the SPA fallback. X-Forwarded-Proto so the issued metadata URLs use the
    # public scheme. CORS (browser MCP clients fetch this cross-origin) is set by
    # the Nest app.
    location ~ ^/\.well-known/oauth {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoint (Streamable HTTP; may stream via SSE) + its OAuth 401 challenge.
    # CORS + OPTIONS preflight + the WWW-Authenticate expose-header are set by the
    # Nest app (enableCors); nginx only carries the proxy/streaming concerns.
    location /mcp {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://localhost:${NEST_SERVER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
} 
